{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body>
    <header class="header">
        <div class="header">
        {% load static %}
            <img src="{% static 'img/dpb-logo.png' %}" alt="Логотип">
        </div>
        <!-- <img src="{% static 'images/logo.png' %}" alt="Логотип" class="logo"> -->

        <div class="header-auth-links">
            <a href="{% url 'articles:login' %}">Вход</a>
        </div>
    </header>

    <main class="auth-content">
        <h1>Регистрация</h1>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Имя пользователя" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <input type="password" name="password2" placeholder="Подтвердите пароль" required>

            <input type="submit" value="Зарегистрироваться">
        </form>

        <p class="auth-link">
            Уже есть аккаунт? <a href="{% url 'articles:login' %}">Войти</a>
        </p>
    </main>
</body>
</html>

{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Создать статью — Коллективный блог</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body>
    <div class="auth-content">
        <h1>Написать статью</h1>

        <form method="POST" action="{% url 'create_post' %}">
            {% csrf_token %}

            <input
                type="text"
                name="title"
                placeholder="Название статьи"
                value="{{ form.title|default:'' }}"
                required
                maxlength="200"
            >

            <textarea
                name="text"
                placeholder="Текст статьи"
                rows="10"
                required
            >{{ form.text|default:'' }}</textarea>

            <input type="submit" value="Сохранить">
        </form>

        {% if form.errors %}
            <p class="error">{{ form.errors }}</p>
        {% endif %}

        <p class="auth-link">
            <a href="{% url 'archive' %}">← На главную</a>
        </p>
    </div>
</body>
</html>

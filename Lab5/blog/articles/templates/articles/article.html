{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }}</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="article">
    <!-- Шапка с логотипом -->
    <div class="header">
        <img class="logo" src="{% static 'img/dpb-logo.png' %}" alt="Логотип">
    </div>

    <!-- Контент статьи -->
    <div class="article-content">
        <h1>{{ post.title }}</h1>

        <div class="article-info">
            <div class="article-author">{{ post.author.username }}</div>
            <div class="article-created-date">{{ post.created_date }}</div>
        </div>

        <p class="article-text">{{ post.text }}</p>

        <!-- Ссылка "Все записи" (задание из методички) -->
        <a href="{% url 'archive' %}" class="back-link">← Все записи</a>
    </div>
</body>
</html>

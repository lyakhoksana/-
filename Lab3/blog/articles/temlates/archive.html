{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</head>
<body class="archive">
    <dсвiv class="header">
        <img src="{% static 'img/dpb-logo.png' %}" alt="Логотип">
    </dсвiv>
    <div class="archive">
        {% for post in posts %}
        <div class="one-post">
            <h2 class="post-title">
                <!-- Задание Lab4: ссылка на статью -->
                <a href="{% url 'get_article' post.id %}">{{ post.title }}</a>
            </h2>
            <div class="article-info">
                <div class="article-author">{{ post.author.username }}</div>
                <div class="article-created-date">{{ post.created_date }}</div>
            </div>
            <p class="article-text">{{ post.get_excerpt }}</p>
        </div>
        {% empty %}
        <p>Статей пока нет.</p>
        {% endfor %}
    </div>
</body>
</html>
